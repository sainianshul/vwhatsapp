version: "3.9"

services:

  app:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: laravel_app

    restart: unless-stopped

    working_dir: /var/www

    volumes:
      - ./:/var/www

    depends_on:
      - mysql
      - redis

  queue:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: laravel_queue

    restart: unless-stopped

    command: php artisan queue:work --sleep=3 --tries=3

    working_dir: /var/www

    volumes:
      - ./:/var/www

    depends_on:
      - mysql
      - redis

  nginx:

    image: nginx:latest

    container_name: laravel_nginx

    restart: unless-stopped
    ports:
      - "8008:80"

    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

  mysql:

    image: mysql:8.0

    container_name: laravel_mysql

    restart: unless-stopped

    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: laravel

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:

    image: phpmyadmin/phpmyadmin

    container_name: laravel_phpmyadmin

    restart: unless-stopped

    ports:
      - "8080:80"

    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root

    depends_on:
      - mysql

  scraper:

    build:
      context: ./scraper
      dockerfile: Dockerfile

    container_name: social_scraper

    restart: unless-stopped

    ports:
      - "3001:3000"

    environment:
      - NODE_ENV=production
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium

  redis:

    image: redis:latest

    container_name: laravel_redis

    restart: unless-stopped

    ports:
      - "6379:6379"

volumes:

  mysql_data:
