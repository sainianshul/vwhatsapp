version: "3.9"

services:

  app:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: vwhatsapp_app

    restart: unless-stopped

    working_dir: /var/www

    environment:
      - TZ=Asia/Kolkata

    volumes:
      - ./:/var/www

    depends_on:
      - mysql
      - redis

  queue-quick:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: vwhatsapp_queue_quick

    restart: unless-stopped

    command: php artisan queue:work --queue=quick --sleep=3 --tries=3

    working_dir: /var/www

    environment:
      - TZ=Asia/Kolkata

    volumes:
      - ./:/var/www

    depends_on:
      - mysql
      - redis

  queue-bulk:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: vwhatsapp_queue_bulk

    restart: unless-stopped

    command: php artisan queue:work --queue=bulk --sleep=3 --tries=1 --timeout=0

    working_dir: /var/www

    environment:
      - TZ=Asia/Kolkata

    volumes:
      - ./:/var/www

    depends_on:
      - mysql
      - redis

  nginx:

    image: nginx:latest

    container_name: vwhatsapp_nginx

    restart: unless-stopped
    ports:
      - "8010:80"

    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

  mysql:

    image: mysql:8.0

    container_name: vwhatsapp_mysql

    restart: unless-stopped

    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: laravel
      TZ: Asia/Kolkata

    ports:
      - "3308:3306"

    volumes:
      - vwhatsapp_mysql_data:/var/lib/mysql

  phpmyadmin:

    image: phpmyadmin/phpmyadmin

    container_name: vwhatsapp_phpmyadmin

    restart: unless-stopped

    ports:
      - "8082:80"

    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root

    depends_on:
      - mysql

  whatsapp-service:

    build:
      context: ./whatsapp-service
      dockerfile: Dockerfile

    container_name: vwhatsapp_service

    restart: unless-stopped

    ports:
      - "3001:3000"

    environment:
      - NODE_ENV=production
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - TZ=Asia/Kolkata
      
    volumes:
      - ./whatsapp-service/.wwebjs_auth:/app/.wwebjs_auth
      - ./whatsapp-service:/app
      - ./storage:/var/www/storage
      - /app/node_modules

  redis:

    image: redis:latest

    container_name: vwhatsapp_redis

    restart: unless-stopped

    ports:
      - "6380:6379"

volumes:

  vwhatsapp_mysql_data:
